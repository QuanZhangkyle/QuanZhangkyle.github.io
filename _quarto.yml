project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!design_demos/"

website:
  title: "Quan Zhang"
  description: "Quan (Kyle) Zhang — health economist and PhD candidate at the University of Hawaiʻi at Mānoa. Causal inference, population aging, and health equity."
  site-url: https://quanzhangkyle.github.io   # TODO: update to https://quanzhang.org once the domain is live
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: teaching.qmd
        text: Teaching
      - href: experience.qmd
        text: Experience
      - href: cv.qmd
        text: CV
    right:
      - icon: envelope
        href: "mailto:quanz@hawaii.edu"
        aria-label: Email
      - icon: mortarboard-fill
        href: "https://scholar.google.com/citations?user=lWeyFo4AAAAJ"
        aria-label: Google Scholar
      - text: '<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px;vertical-align:-3px"><path fill="#A6CE39" d="M256,128c0,70.7-57.3,128-128,128C57.3,256,0,198.7,0,128C0,57.3,57.3,0,128,0C198.7,0,256,57.3,256,128z"/><path fill="#FFFFFF" fill-rule="evenodd" d="M108.9,79.1h41.6c39.6,0,57,28.3,57,53.6c0,27.5-21.5,53.6-56.8,53.6h-41.8V79.1z M124.3,172.4h24.5c34.9,0,42.9-26.5,42.9-39.7c0-21.5-13.7-39.7-43.7-39.7h-23.7V172.4z"/><path fill="#FFFFFF" d="M86.3,186.2H70.9V79.1h15.4v107.1z"/><path fill="#FFFFFF" d="M88.7,56.8c0,5.5-4.5,10.1-10.1,10.1c-5.6,0-10.1-4.6-10.1-10.1c0-5.6,4.5-10.1,10.1-10.1C84.2,46.7,88.7,51.3,88.7,56.8z"/></svg>'
        href: "https://orcid.org/0009-0009-2409-309X"
        aria-label: ORCID
      - icon: linkedin
        href: "https://www.linkedin.com/in/quanzhangkyle/"
        aria-label: LinkedIn
      - icon: github
        href: "https://github.com/QuanZhangkyle"
        aria-label: GitHub
  page-footer:
    border: true
    left: "© 2026 Quan (Kyle) Zhang"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: false
    grid:
      body-width: 900px
    link-external-newwindow: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

editor: source
