project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!design_demos/"

website:
  title: "Quan Zhang"
  description: "Quan (Kyle) Zhang — health economist and PhD candidate at the University of Hawaiʻi at Mānoa. Causal inference, population aging, and health equity."
  site-url: https://quanzhangkyle.github.io   # TODO: update to https://quanzhang.org once the domain is live
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: teaching.qmd
        text: Teaching
      - href: experience.qmd
        text: Experience
      - href: cv.qmd
        text: CV
    right:
      - icon: envelope
        href: "mailto:quanz@hawaii.edu"
        aria-label: Email
      - icon: mortarboard-fill
        href: "https://scholar.google.com/citations?user=lWeyFo4AAAAJ"
        aria-label: Google Scholar
      - text: '<i class="ai ai-orcid"></i>'
        href: "https://orcid.org/0009-0009-2409-309X"
        aria-label: ORCID
      - icon: linkedin
        href: "https://www.linkedin.com/in/quanzhangkyle/"
        aria-label: LinkedIn
      - icon: github
        href: "https://github.com/QuanZhangkyle"
        aria-label: GitHub
  page-footer:
    border: true
    left: "© 2026 Quan (Kyle) Zhang"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: false
    grid:
      body-width: 900px
    link-external-newwindow: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.4/css/academicons.min.css">

editor: source
